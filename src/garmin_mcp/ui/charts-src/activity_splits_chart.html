<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Activity splits chart</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: var(--font-sans, system-ui, sans-serif);
    color: var(--color-text-primary, #1b1b1f);
    background: var(--color-background-secondary, transparent);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: var(--font-heading-md-size, 16px);
    margin: 0;
    font-weight: 600;
  }
  .header .score {
    font-size: var(--font-text-sm-size, 13px);
    color: var(--color-text-secondary, #6b6b76);
  }
  .bars {
    position: relative;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 180px;
    padding: 0 4px;
    overflow-x: auto;
  }
  .bar-col {
    flex: 1;
    min-width: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
  }
  .bar {
    width: 100%;
    max-width: 40px;
    border-radius: var(--border-radius-md, 6px) var(--border-radius-md, 6px) 0 0;
    background: #1c7ed6;
    transition: height 0.3s ease;
  }
  .bar-label {
    margin-top: 8px;
    font-size: var(--font-text-xs-size, 11px);
    color: var(--color-text-secondary, #6b6b76);
    text-align: center;
    white-space: nowrap;
  }
  .bar-value {
    font-size: var(--font-text-xs-size, 11px);
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
  }
  .bar-hr {
    margin-top: 2px;
    font-size: var(--font-text-xs-size, 11px);
    color: #e03131;
    white-space: nowrap;
  }
  .empty, .error {
    color: var(--color-text-secondary, #6b6b76);
    font-size: var(--font-text-sm-size, 13px);
    padding: 24px 4px;
    text-align: center;
  }
  .error { color: var(--color-text-danger, #c4453a); }
</style>
</head>
<body>
  <div class="header">
    <h1 id="title">Activity Splits</h1>
    <span class="score" id="score"></span>
  </div>
  <div id="content" class="empty">Waiting for split data&hellip;</div>

<script type="module">
  import { App, PostMessageTransport, applyDocumentTheme, applyHostStyleVariables, applyHostFonts }
    from "@modelcontextprotocol/ext-apps";

  const scoreEl = document.getElementById("score");
  const contentEl = document.getElementById("content");

  function extractPayload(result) {
    if (!result) return null;
    // FastMCP wraps a plain-string tool return as { result: "<json>" } in
    // structuredContent, since structuredContent must itself be an object.
    if (typeof result === "object" && !Array.isArray(result) && typeof result.result === "string") {
      try {
        return JSON.parse(result.result);
      } catch {
        return null;
      }
    }
    return result;
  }

  function parseToolResult(result) {
    if (!result) return null;
    if (result.structuredContent) {
      const parsed = extractPayload(result.structuredContent);
      if (parsed) return parsed;
    }
    const textBlock = (result.content || []).find((c) => c.type === "text");
    if (!textBlock) return null;
    try {
      return JSON.parse(textBlock.text);
    } catch {
      return null;
    }
  }

  function renderError(message) {
    contentEl.className = "error";
    contentEl.textContent = message;
  }

  function formatPace(secPerKm) {
    if (secPerKm == null || !isFinite(secPerKm) || secPerKm <= 0) return null;
    const m = Math.floor(secPerKm / 60);
    const s = Math.round(secPerKm % 60);
    return `${m}:${String(s).padStart(2, "0")}/km`;
  }

  function formatDuration(sec) {
    if (sec == null || !isFinite(sec) || sec <= 0) return null;
    const m = Math.floor(sec / 60);
    const s = Math.round(sec % 60);
    return `${m}:${String(s).padStart(2, "0")}`;
  }

  function renderChart(payload) {
    const laps = payload && Array.isArray(payload.laps) ? payload.laps : null;
    if (!laps || !laps.length) {
      renderError("No split data available for this activity.");
      return;
    }

    const entries = laps
      .map((lap, i) => {
        const distance = Number(lap.distance_meters) || null;
        const duration = Number(lap.duration_seconds) || null;
        const pace = distance && duration ? duration / (distance / 1000) : null;
        return {
          lapNumber: lap.lap_number ?? i + 1,
          pace,
          duration,
          hr: lap.avg_hr_bpm != null ? Number(lap.avg_hr_bpm) : null,
        };
      })
      .filter((e) => e.pace != null || e.duration != null);

    if (!entries.length) {
      renderError("No usable split data (missing distance/duration) for this activity.");
      return;
    }

    // Prefer pace (time/km) when every lap has distance; otherwise fall back
    // to raw lap duration, since not every sport records distance per lap.
    const usePace = entries.every((e) => e.pace != null);
    const values = entries.map((e) => (usePace ? e.pace : e.duration));
    const maxValue = Math.max(...values, 1);

    const avgValue = values.reduce((a, b) => a + b, 0) / values.length;
    scoreEl.textContent = usePace
      ? `Avg ${formatPace(avgValue)}`
      : `Avg ${formatDuration(avgValue)}/lap`;

    const bars = document.createElement("div");
    bars.className = "bars";

    entries.forEach((entry) => {
      const value = usePace ? entry.pace : entry.duration;
      const heightPct = Math.max(4, Math.round((value / maxValue) * 100));

      const col = document.createElement("div");
      col.className = "bar-col";

      const valueEl = document.createElement("div");
      valueEl.className = "bar-value";
      valueEl.textContent = usePace ? formatPace(value) : formatDuration(value);

      const bar = document.createElement("div");
      bar.className = "bar";
      bar.style.height = `${heightPct}%`;

      const label = document.createElement("div");
      label.className = "bar-label";
      label.textContent = `Lap ${entry.lapNumber}`;

      col.appendChild(valueEl);
      col.appendChild(bar);
      col.appendChild(label);

      if (entry.hr != null) {
        const hrEl = document.createElement("div");
        hrEl.className = "bar-hr";
        hrEl.textContent = `♥ ${Math.round(entry.hr)}`;
        col.appendChild(hrEl);
      }

      bars.appendChild(col);
    });

    contentEl.className = "";
    contentEl.replaceChildren(bars);
  }

  const app = new App({ name: "garmin-mcp-activity-splits-chart", version: "0.1.0" });

  app.ontoolinput = () => {
    contentEl.className = "empty";
    contentEl.textContent = "Loading split data…";
  };

  app.ontoolresult = (result) => {
    const payload = parseToolResult(result);
    renderChart(payload);
  };

  app.onhostcontextchanged = (ctx) => {
    if (ctx.theme) applyDocumentTheme(ctx.theme);
    if (ctx.styles?.variables) applyHostStyleVariables(ctx.styles.variables);
    if (ctx.styles?.css?.fonts) applyHostFonts(ctx.styles.css.fonts);
    if (ctx.safeAreaInsets) {
      const { top, right, bottom, left } = ctx.safeAreaInsets;
      document.body.style.padding = `${top ?? 16}px ${right ?? 16}px ${bottom ?? 16}px ${left ?? 16}px`;
    }
  };

  app.onteardown = async () => ({});

  try {
    await app.connect(new PostMessageTransport());
  } catch (err) {
    renderError(`Failed to connect to host: ${err?.message || err}`);
  }
</script>
</body>
</html>
