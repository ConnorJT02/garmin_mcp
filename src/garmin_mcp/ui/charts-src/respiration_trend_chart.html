<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Respiration trend chart</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: var(--font-sans, system-ui, sans-serif);
    color: var(--color-text-primary, #1b1b1f);
    background: var(--color-background-secondary, transparent);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: var(--font-heading-md-size, 16px);
    margin: 0;
    font-weight: 600;
  }
  .header .score {
    font-size: var(--font-text-sm-size, 13px);
    color: var(--color-text-secondary, #6b6b76);
  }
  .chart-wrapper {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .line-chart {
    width: 100%;
    height: 160px;
    display: block;
    overflow: visible;
  }
  .line-path {
    fill: none;
    stroke: var(--color-accent, #1098ad);
    stroke-width: 2;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .line-dot {
    fill: var(--color-accent, #1098ad);
  }
  .x-labels {
    display: flex;
    justify-content: space-between;
    font-size: var(--font-text-xs-size, 11px);
    color: var(--color-text-secondary, #6b6b76);
    padding: 0 2px;
  }
  .empty, .error {
    color: var(--color-text-secondary, #6b6b76);
    font-size: var(--font-text-sm-size, 13px);
    padding: 24px 4px;
    text-align: center;
  }
  .error { color: var(--color-text-danger, #c4453a); }
</style>
</head>
<body>
  <div class="header">
    <h1 id="title">Respiration Trend</h1>
    <span class="score" id="score"></span>
  </div>
  <div id="content" class="empty">Waiting for respiration trend data&hellip;</div>

<script type="module">
  import { buildLineChartSVG, createTrendChartApp, connectTrendChartApp } from "./_shared/mcp-line-chart.js";

  const SERIES = [{ key: "avg_sleep_breaths_per_min", color: "#1098ad" }];

  const scoreEl = document.getElementById("score");
  const contentEl = document.getElementById("content");

  function renderError(message) {
    contentEl.className = "error";
    contentEl.textContent = message;
  }

  function render(payload) {
    const trend = payload && Array.isArray(payload.trend) ? payload.trend : null;
    if (!trend || !trend.length) {
      renderError("No respiration trend data available for this range.");
      return;
    }

    const wrapper = buildLineChartSVG(trend, SERIES);
    if (!wrapper) {
      renderError("No sleep respiration data available for this range.");
      return;
    }

    scoreEl.textContent = payload.period_avg_sleep_breaths_per_min != null
      ? `Avg sleep ${payload.period_avg_sleep_breaths_per_min} br/min`
      : "";

    contentEl.className = "";
    contentEl.replaceChildren(wrapper);
  }

  const app = createTrendChartApp({ name: "garmin-mcp-respiration-trend-chart", contentEl, render });
  await connectTrendChartApp(app, renderError);
</script>
</body>
</html>
