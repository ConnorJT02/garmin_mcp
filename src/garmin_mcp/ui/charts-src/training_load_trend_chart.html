<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Training load trend chart</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: var(--font-sans, system-ui, sans-serif);
    color: var(--color-text-primary, #1b1b1f);
    background: var(--color-background-secondary, transparent);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: var(--font-heading-md-size, 16px);
    margin: 0;
    font-weight: 600;
  }
  .header .score {
    font-size: var(--font-text-sm-size, 13px);
    color: var(--color-text-secondary, #6b6b76);
  }
  .legend {
    display: flex;
    gap: 14px;
    margin-bottom: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: var(--font-text-xs-size, 11px);
    color: var(--color-text-secondary, #6b6b76);
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .chart-wrapper {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .line-chart {
    width: 100%;
    height: 160px;
    display: block;
    overflow: visible;
  }
  .line-path {
    fill: none;
    stroke-width: 2;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .x-labels {
    display: flex;
    justify-content: space-between;
    font-size: var(--font-text-xs-size, 11px);
    color: var(--color-text-secondary, #6b6b76);
    padding: 0 2px;
  }
  .empty, .error {
    color: var(--color-text-secondary, #6b6b76);
    font-size: var(--font-text-sm-size, 13px);
    padding: 24px 4px;
    text-align: center;
  }
  .error { color: var(--color-text-danger, #c4453a); }
</style>
</head>
<body>
  <div class="header">
    <h1 id="title">Training Load Trend</h1>
    <span class="score" id="score"></span>
  </div>
  <div id="content" class="empty">Waiting for training load trend data&hellip;</div>

<script type="module">
  import { buildLineChartSVG, buildLegend, createTrendChartApp, connectTrendChartApp } from "./_shared/mcp-line-chart.js";

  const SERIES = [
    { key: "ctl", color: "#3b5bdb", label: "Fitness (CTL)" },
    { key: "atl", color: "#f08c00", label: "Fatigue (ATL)" },
  ];

  const scoreEl = document.getElementById("score");
  const contentEl = document.getElementById("content");

  function renderError(message) {
    contentEl.className = "error";
    contentEl.textContent = message;
  }

  function render(payload) {
    const trend = payload && Array.isArray(payload.trend) ? payload.trend : null;
    if (!trend || !trend.length) {
      renderError("No training load trend data available for this range.");
      return;
    }

    const chart = buildLineChartSVG(trend, SERIES);
    if (!chart) {
      renderError("No ATL/CTL data available for this range.");
      return;
    }

    const legend = buildLegend(SERIES);
    const container = document.createElement("div");
    container.appendChild(legend);
    container.appendChild(chart);

    const latest = trend[trend.length - 1];
    scoreEl.textContent = latest.tsb != null ? `Latest TSB ${latest.tsb}` : "";

    contentEl.className = "";
    contentEl.replaceChildren(container);
  }

  const app = createTrendChartApp({ name: "garmin-mcp-training-load-trend-chart", contentEl, render });
  await connectTrendChartApp(app, renderError);
</script>
</body>
</html>
