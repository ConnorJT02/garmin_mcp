<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stress chart</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: var(--font-sans, system-ui, sans-serif);
    color: var(--color-text-primary, #1b1b1f);
    background: var(--color-background-secondary, transparent);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: var(--font-heading-md-size, 16px);
    margin: 0;
    font-weight: 600;
  }
  .header .score {
    font-size: var(--font-text-sm-size, 13px);
    color: var(--color-text-secondary, #6b6b76);
  }
  .bars {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    height: 160px;
    padding: 0 4px;
  }
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
  }
  .bar {
    width: 100%;
    max-width: 48px;
    border-radius: var(--border-radius-md, 6px) var(--border-radius-md, 6px) 0 0;
    transition: height 0.3s ease;
  }
  .bar-label {
    margin-top: 8px;
    font-size: var(--font-text-xs-size, 11px);
    color: var(--color-text-secondary, #6b6b76);
    text-align: center;
  }
  .bar-value {
    font-size: var(--font-text-xs-size, 11px);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .empty, .error {
    color: var(--color-text-secondary, #6b6b76);
    font-size: var(--font-text-sm-size, 13px);
    padding: 24px 4px;
    text-align: center;
  }
  .error { color: var(--color-text-danger, #c4453a); }
</style>
</head>
<body>
  <div class="header">
    <h1 id="title">Stress</h1>
    <span class="score" id="score"></span>
  </div>
  <div id="content" class="empty">Waiting for stress data&hellip;</div>

<script type="module">
  import { App, PostMessageTransport, applyDocumentTheme, applyHostStyleVariables, applyHostFonts }
    from "@modelcontextprotocol/ext-apps";

  const BUCKETS = [
    { key: "rest_percent", label: "Rest", color: "#3b5bdb" },
    { key: "low_stress_percent", label: "Low", color: "#748ffc" },
    { key: "medium_stress_percent", label: "Medium", color: "#f08c00" },
    { key: "high_stress_percent", label: "High", color: "#e03131" },
  ];

  const scoreEl = document.getElementById("score");
  const contentEl = document.getElementById("content");

  function extractSummary(result) {
    if (!result || typeof result !== "object" || Array.isArray(result)) return null;
    // FastMCP wraps a plain-string tool return as { result: "<json>" } in
    // structuredContent, since structuredContent must itself be an object.
    if (typeof result.result === "string") {
      try {
        return JSON.parse(result.result);
      } catch {
        return null;
      }
    }
    return Object.keys(result).length ? result : null;
  }

  function parseToolResult(result) {
    if (!result) return null;
    if (result.structuredContent) {
      const parsed = extractSummary(result.structuredContent);
      if (parsed) return parsed;
    }
    const textBlock = (result.content || []).find((c) => c.type === "text");
    if (!textBlock) return null;
    try {
      return JSON.parse(textBlock.text);
    } catch {
      return null;
    }
  }

  function renderError(message) {
    contentEl.className = "error";
    contentEl.textContent = message;
  }

  function renderChart(summary) {
    if (!summary || typeof summary !== "object") {
      renderError("No stress data available for this date.");
      return;
    }

    const values = BUCKETS.map((b) => Math.max(0, Number(summary[b.key]) || 0));

    if (values.every((v) => v === 0)) {
      renderError("No stress distribution data available for this date.");
      return;
    }

    const maxPct = Math.max(...values, 1);

    const scoreParts = [];
    if (summary.avg_stress_level != null) scoreParts.push(`Avg ${summary.avg_stress_level}`);
    if (summary.max_stress_level != null) scoreParts.push(`Max ${summary.max_stress_level}`);
    scoreEl.textContent = scoreParts.join(" · ");

    const bars = document.createElement("div");
    bars.className = "bars";

    BUCKETS.forEach((bucket, i) => {
      const pct = values[i];
      const heightPct = Math.max(4, Math.round((pct / maxPct) * 100));

      const col = document.createElement("div");
      col.className = "bar-col";

      const valueEl = document.createElement("div");
      valueEl.className = "bar-value";
      valueEl.textContent = `${pct}%`;

      const bar = document.createElement("div");
      bar.className = "bar";
      bar.style.height = `${heightPct}%`;
      bar.style.background = bucket.color;

      const label = document.createElement("div");
      label.className = "bar-label";
      label.textContent = bucket.label;

      col.appendChild(valueEl);
      col.appendChild(bar);
      col.appendChild(label);
      bars.appendChild(col);
    });

    contentEl.replaceWith(bars);
    bars.id = "content";
  }

  const app = new App({ name: "garmin-mcp-stress-chart", version: "0.1.0" });

  app.ontoolinput = () => {
    contentEl.className = "empty";
    contentEl.textContent = "Loading stress data…";
  };

  app.ontoolresult = (result) => {
    const summary = parseToolResult(result);
    renderChart(summary);
  };

  app.onhostcontextchanged = (ctx) => {
    if (ctx.theme) applyDocumentTheme(ctx.theme);
    if (ctx.styles?.variables) applyHostStyleVariables(ctx.styles.variables);
    if (ctx.styles?.css?.fonts) applyHostFonts(ctx.styles.css.fonts);
    if (ctx.safeAreaInsets) {
      const { top, right, bottom, left } = ctx.safeAreaInsets;
      document.body.style.padding = `${top ?? 16}px ${right ?? 16}px ${bottom ?? 16}px ${left ?? 16}px`;
    }
  };

  app.onteardown = async () => ({});

  try {
    await app.connect(new PostMessageTransport());
  } catch (err) {
    renderError(`Failed to connect to host: ${err?.message || err}`);
  }
</script>
</body>
</html>
