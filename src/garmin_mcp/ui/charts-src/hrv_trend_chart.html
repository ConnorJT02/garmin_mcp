<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HRV trend chart</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: var(--font-sans, system-ui, sans-serif);
    color: var(--color-text-primary, #1b1b1f);
    background: var(--color-background-secondary, transparent);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: var(--font-heading-md-size, 16px);
    margin: 0;
    font-weight: 600;
  }
  .header .score {
    font-size: var(--font-text-sm-size, 13px);
    color: var(--color-text-secondary, #6b6b76);
  }
  .chart-wrapper {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .line-chart {
    width: 100%;
    height: 160px;
    display: block;
    overflow: visible;
  }
  .line-path {
    fill: none;
    stroke: var(--color-accent, #3b5bdb);
    stroke-width: 2;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .line-dot {
    fill: var(--color-accent, #3b5bdb);
  }
  .x-labels {
    display: flex;
    justify-content: space-between;
    font-size: var(--font-text-xs-size, 11px);
    color: var(--color-text-secondary, #6b6b76);
    padding: 0 2px;
  }
  .empty, .error {
    color: var(--color-text-secondary, #6b6b76);
    font-size: var(--font-text-sm-size, 13px);
    padding: 24px 4px;
    text-align: center;
  }
  .error { color: var(--color-text-danger, #c4453a); }
</style>
</head>
<body>
  <div class="header">
    <h1 id="title">HRV Trend</h1>
    <span class="score" id="score"></span>
  </div>
  <div id="content" class="empty">Waiting for HRV trend data&hellip;</div>

<script type="module">
  import { App, PostMessageTransport, applyDocumentTheme, applyHostStyleVariables, applyHostFonts }
    from "@modelcontextprotocol/ext-apps";

  const scoreEl = document.getElementById("score");
  const contentEl = document.getElementById("content");

  function extractPayload(result) {
    if (!result) return null;
    // FastMCP wraps a plain-string tool return as { result: "<json>" } in
    // structuredContent, since structuredContent must itself be an object.
    if (typeof result === "object" && !Array.isArray(result) && typeof result.result === "string") {
      try {
        return JSON.parse(result.result);
      } catch {
        return null;
      }
    }
    return result;
  }

  function parseToolResult(result) {
    if (!result) return null;
    if (result.structuredContent) {
      const parsed = extractPayload(result.structuredContent);
      if (parsed) return parsed;
    }
    const textBlock = (result.content || []).find((c) => c.type === "text");
    if (!textBlock) return null;
    try {
      return JSON.parse(textBlock.text);
    } catch {
      return null;
    }
  }

  function renderError(message) {
    contentEl.className = "error";
    contentEl.textContent = message;
  }

  function formatDateLabel(dateStr) {
    const d = new Date(`${dateStr}T00:00:00`);
    if (Number.isNaN(d.getTime())) return dateStr;
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }

  function renderChart(payload) {
    const trend = payload && Array.isArray(payload.trend) ? payload.trend : null;
    if (!trend || !trend.length) {
      renderError("No HRV trend data available for this range.");
      return;
    }

    const points = trend
      .map((e) => ({ date: e.date, value: Number(e.last_night_avg_hrv_ms) }))
      .filter((p) => p.date && Number.isFinite(p.value));

    if (!points.length) {
      renderError("No HRV values available for this range.");
      return;
    }

    const values = points.map((p) => p.value);
    const minV = Math.min(...values);
    const maxV = Math.max(...values, minV + 1);

    const W = 600, H = 160, padX = 6, padY = 10;
    const innerW = W - padX * 2;
    const innerH = H - padY * 2;

    const coords = points.map((p, i) => {
      const x = points.length === 1 ? padX + innerW / 2 : padX + (i / (points.length - 1)) * innerW;
      const y = padY + innerH - ((p.value - minV) / (maxV - minV)) * innerH;
      return { x, y, date: p.date };
    });

    const pathD = coords.map((c, i) => `${i === 0 ? "M" : "L"} ${c.x.toFixed(1)} ${c.y.toFixed(1)}`).join(" ");

    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    svg.setAttribute("class", "line-chart");
    svg.setAttribute("preserveAspectRatio", "none");

    const path = document.createElementNS(svgNS, "path");
    path.setAttribute("d", pathD);
    path.setAttribute("class", "line-path");
    svg.appendChild(path);

    // Only draw individual dots when there aren't too many, to avoid clutter
    // on long (e.g. 2-year) ranges.
    if (coords.length <= 60) {
      coords.forEach((c) => {
        const dot = document.createElementNS(svgNS, "circle");
        dot.setAttribute("cx", c.x.toFixed(1));
        dot.setAttribute("cy", c.y.toFixed(1));
        dot.setAttribute("r", "2.5");
        dot.setAttribute("class", "line-dot");
        svg.appendChild(dot);
      });
    }

    const wrapper = document.createElement("div");
    wrapper.className = "chart-wrapper";
    wrapper.appendChild(svg);

    const labelRow = document.createElement("div");
    labelRow.className = "x-labels";
    const labelCount = Math.min(5, coords.length);
    for (let i = 0; i < labelCount; i++) {
      const idx = labelCount === 1 ? 0 : Math.round((i / (labelCount - 1)) * (coords.length - 1));
      const label = document.createElement("span");
      label.textContent = formatDateLabel(coords[idx].date);
      labelRow.appendChild(label);
    }
    wrapper.appendChild(labelRow);

    const scoreParts = [`Min ${minV}ms`, `Max ${maxV}ms`];
    if (payload.period_avg_hrv_ms != null) scoreParts.push(`Avg ${payload.period_avg_hrv_ms}ms`);
    scoreEl.textContent = scoreParts.join(" · ");

    contentEl.className = "";
    contentEl.replaceChildren(wrapper);
  }

  const app = new App({ name: "garmin-mcp-hrv-trend-chart", version: "0.1.0" });

  app.ontoolinput = () => {
    contentEl.className = "empty";
    contentEl.textContent = "Loading HRV trend data…";
  };

  app.ontoolresult = (result) => {
    const payload = parseToolResult(result);
    renderChart(payload);
  };

  app.onhostcontextchanged = (ctx) => {
    if (ctx.theme) applyDocumentTheme(ctx.theme);
    if (ctx.styles?.variables) applyHostStyleVariables(ctx.styles.variables);
    if (ctx.styles?.css?.fonts) applyHostFonts(ctx.styles.css.fonts);
    if (ctx.safeAreaInsets) {
      const { top, right, bottom, left } = ctx.safeAreaInsets;
      document.body.style.padding = `${top ?? 16}px ${right ?? 16}px ${bottom ?? 16}px ${left ?? 16}px`;
    }
  };

  app.onteardown = async () => ({});

  try {
    await app.connect(new PostMessageTransport());
  } catch (err) {
    renderError(`Failed to connect to host: ${err?.message || err}`);
  }
</script>
</body>
</html>
